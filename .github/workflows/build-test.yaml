name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      dremio:
        image: dremio/dremio-oss
        ports:
          - 31010:31010
          - 9047:9047
        env:
          DREMIO_JAVA_SERVER_EXTRA_OPTS: -Ddebug.addDefaultUser=true
        options: >-
          --health-cmd "curl -s http://localhost:9047 || exit 1" 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: password
        options: >-
          server /data --console-address ":9001" 
          --health-cmd "curl -s http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout Repository
      - name: Check out repository
        uses: actions/checkout@v2

      # 2. Set Up Environment Variables
      - name: Set up Environment Variables
        run: |
          echo "DREMIO_SOFTWARE_HOST=localhost" >> $GITHUB_ENV
          echo "DREMIO_SOFTWARE_USERNAME=dremio" >> $GITHUB_ENV
          echo "DREMIO_SOFTWARE_PASSWORD=dremio123" >> $GITHUB_ENV
          echo "DREMIO_DATALAKE=dbt_test_source" >> $GITHUB_ENV
          echo "DREMIO_DATABASE=dbt_test" >> $GITHUB_ENV
          echo "DBT_TEST_USER_1=dbt_test_user_1" >> $GITHUB_ENV
          echo "DBT_TEST_USER_2=dbt_test_user_2" >> $GITHUB_ENV
          echo "DBT_TEST_USER_3=dbt_test_user_3" >> $GITHUB_ENV

      # 3. Install MinIO Client (mc)
      - name: Install MinIO Client (mc)
        run: |
          curl -O https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      # 4. Wait for Services to be Ready
      - name: Wait for Services to be Ready
        run: |
          # Function to wait for a URL to be accessible
          wait_for_url() {
            local url=$1
            local name=$2
            local retries=12
            local count=0
            until curl -s "$url" > /dev/null; do
              count=$((count + 1))
              if [ $count -ge $retries ]; then
                echo "$name did not become ready in time."
                exit 1
              fi
              echo "Waiting for $name to become ready..."
              sleep 5
            done
            echo "$name is up."
          }

          # Wait for MinIO
          wait_for_url "http://localhost:9000/minio/health/live" "MinIO"

          # Wait for Dremio
          wait_for_url "http://localhost:9047" "Dremio"

      # 5. Configure MinIO Using mc
      - name: Configure MinIO using mc
        run: |
          # Set alias to MinIO
          mc alias set myminio http://localhost:9000 admin password

          echo "Creating bucket dbtdremios3"
          mc mb myminio/dbtdremios3

          echo "Setting bucket policy to public"
          mc policy set public myminio/dbtdremios3

          echo "Listing all buckets to verify"
          mc ls myminio

      # 6. Create Dremio S3 Source
      - name: "Create Dremio S3 Source"
        run: |
          # Install required tools
          sudo apt-get update
          sudo apt-get install -y curl jq

          echo "Logging into Dremio to obtain auth token..."
          AUTH_TOKEN=$(curl -s -X POST "http://localhost:9047/apiv2/login" \
            -H "Content-Type: application/json" \
            --data "{\"userName\":\"dremio\", \"password\":\"dremio123\"}" | jq -r .token)

          # Check if AUTH_TOKEN is not empty
          if [ -z "$AUTH_TOKEN" ]; then
            echo "Failed to obtain Dremio auth token"
            exit 1
          fi

          echo "Obtained Dremio auth token: $AUTH_TOKEN"

          echo "Creating the S3 source in Dremio..."
          curl -s -X PUT "http://localhost:9047/apiv2/source/dbt_test_source" \
            -H "Content-Type: application/json" \
            -H "Authorization: _dremio$AUTH_TOKEN" \
            --data "{\"name\":\"dbt_test_source\",\"config\":{\"credentialType\":\"ACCESS_KEY\",\"accessKey\":\"admin\",\"accessSecret\":\"password\",\"secure\":false,\"externalBucketList\":[],\"enableAsync\":true,\"enableFileStatusCheck\":true,\"rootPath\":\"/\",\"defaultCtasFormat\":\"ICEBERG\",\"propertyList\":[{\"name\":\"fs.s3a.path.style.access\",\"value\":\"true\"},{\"name\":\"fs.s3a.endpoint\",\"value\":\"localhost:9000\"},{\"name\":\"dremio.s3.compat\",\"value\":\"true\"}],\"whitelistedBuckets\":[],\"isCachingEnabled\":false,\"maxCacheSpacePct\":100},\"type\":\"S3\",\"metadataPolicy\":{\"deleteUnavailableDatasets\":true,\"autoPromoteDatasets\":false,\"namesRefreshMillis\":3600000,\"datasetDefinitionRefreshAfterMillis\":3600000,\"datasetDefinitionExpireAfterMillis\":10800000,\"authTTLMillis\":86400000,\"updateMode\":\"PREFETCH_QUERIED\"}}"

          echo "S3 Source created in Dremio"

      # 7. Install Python Dependencies
      - name: Install Dependencies
        run: |
          pip install -r dev_requirements.txt

      # 8. Clean Up __pycache__ Directories
      - name: Clean up __pycache__ directories
        run: |
          find . -type d -name "__pycache__" -exec rm -r {} +

      # 9. Create .env File for Tests
      - name: Create .env file for tests
        run: |
          mkdir -p tests
          cat <<EOF > tests/.env
          DREMIO_SOFTWARE_HOST=localhost
          DREMIO_SOFTWARE_USERNAME=dremio
          DREMIO_SOFTWARE_PASSWORD=dremio123
          DREMIO_DATALAKE=dbt_test_source
          DREMIO_DATABASE=dbt_test
          DBT_TEST_USER_1=dbt_test_user_1
          DBT_TEST_USER_2=dbt_test_user_2
          DBT_TEST_USER_3=dbt_test_user_3
          EOF

      # 10. Run Caching Tests
      - name: Run Caching tests
        run: |
          pytest tests/caching | tee -a func_test_$(date +%Y_%m_%d).log