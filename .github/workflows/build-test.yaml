name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-dremio:
    runs-on: ubuntu-latest
    services:
      dremio:
        image: dremio/dremio-oss
        ports:
          - 31010:31010
          - 9047:9047
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Dremio environment
        run: |
          echo "DREMIO_SOFTWARE_HOST=localhost" >> $GITHUB_ENV
          echo "DREMIO_SOFTWARE_USERNAME=admin" >> $GITHUB_ENV
          echo "DREMIO_SOFTWARE_PASSWORD=admin" >> $GITHUB_ENV
          echo "DREMIO_DATALAKE=dbt_test_source" >> $GITHUB_ENV
          echo "DREMIO_DATABASE=dbt_test" >> $GITHUB_ENV
          echo "DBT_TEST_USER_1=dbt_test_user_1" >> $GITHUB_ENV
          echo "DBT_TEST_USER_2=dbt_test_user_2" >> $GITHUB_ENV
          echo "DBT_TEST_USER_3=dbt_test_user_3" >> $GITHUB_ENV

  run-tests:
    runs-on: ubuntu-latest
    needs: deploy-dremio
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r dev_requirements.txt

      - name: Clean up __pycache__ directories
        run: find . -type d -name "__pycache__" -exec rm -r {} +

      - name: Run Caching tests
        run: |
          pytest tests/caching | tee -a func_test_$(date +%Y_%m_%d).log